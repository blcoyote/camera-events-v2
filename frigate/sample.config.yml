          roles:
            - record
            - rtmp
        - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.0.x:8554/Streaming/Channels/102
          roles:
            - detect
    detect:
      enabled: true
      width: 640
      height: 360
      fps: 5
    snapshots:
      enabled: true
    objects:
      filters:
        person:
          mask:
            - 28,66,63,64,69,128,35,125
            - 640,360,400,360,494,0,640,0
    motion:
      mask:
        - 0,0,0,40,183,42,180,0
        - 640,360,388,360,462,0,640,0
        - 78,124,77,41,0,41,0,125
  gavl_oest:
    ui:
      order: 4
      dashboard: true
    ffmpeg:
      input_args: preset-rtsp-udp
      inputs:
        - path: rtsp://admin:{FRIGATE_RTSP_PASSWORD}@192.168.0.x:8554/Streaming/Channels/101
          roles:
            - rtmp
