services:
  ce-v2:
    build: .
    ports:
      - '3000:80'
    environment:
      NODE_ENV: production
      MQTT_URL: mqtt://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:1883
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      APP_URL: ${DNS_NAME:-}
      FRIGATE_URL: ${FRIGATE_URL}
      FRIGATE_MOCK: ${FRIGATE_MOCK:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    volumes:
      - ce-v2-data:/app/data
    labels:
      - traefik.http.routers.ce.rule=Host(`$DNS_NAME`)
      - traefik.http.routers.ce.tls=true
      - traefik.http.routers.ce.tls.certresolver=lets-encrypt
      - traefik.http.services.ce.loadbalancer.server.port=80
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    build: ./rabbitmq
    hostname: rabbitmq
    ports:
      - '1883:1883'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ce-v2-data:
  rabbitmq-data:
