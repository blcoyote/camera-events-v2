services:
  app:
    image: ghcr.io/blcoyote/camera-events-v2:release
    pull_policy: always
    restart: unless-stopped
    ports:
      # Bound to loopback: Traefik reaches the app over the `proxy` network,
      # not the host port. This keeps the app off 0.0.0.0 (no plain-HTTP bypass
      # of Traefik's TLS + security headers).
      - '127.0.0.1:3000:3000'
    environment:
      NODE_ENV: production
      MQTT_URL: mqtt://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:1883
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      SESSION_SECRET: ${SESSION_SECRET:-}
      APP_URL: https://${DNS_NAME:-localhost}
      FRIGATE_URL: ${FRIGATE_URL}
      FRIGATE_MOCK: ${FRIGATE_MOCK:-}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-}
    volumes:
      - ce-v2-data:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.ce2.rule=Host(`$DNS_NAME`)
      - traefik.http.routers.ce2.entrypoints=websecure
      - traefik.http.routers.ce2.tls=true
      - traefik.http.routers.ce2.tls.certresolver=letsencrypt
      - traefik.http.services.ce2.loadbalancer.server.port=3000
      - traefik.http.routers.ce2.middlewares=ce2-sec@docker
      - traefik.http.middlewares.ce2-sec.headers.stsSeconds=31536000
      - traefik.http.middlewares.ce2-sec.headers.stsIncludeSubdomains=true
      - traefik.http.middlewares.ce2-sec.headers.stsPreload=true
      - traefik.http.middlewares.ce2-sec.headers.contentTypeNosniff=true
      - traefik.http.middlewares.ce2-sec.headers.frameDeny=true
      - traefik.http.middlewares.ce2-sec.headers.referrerPolicy=strict-origin-when-cross-origin
      - traefik.http.middlewares.ce2-sec.headers.permissionsPolicy=camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()
      - traefik.http.middlewares.ce2-sec.headers.customResponseHeaders.Cross-Origin-Opener-Policy=same-origin
      - traefik.http.middlewares.ce2-sec.headers.customResponseHeaders.Cross-Origin-Resource-Policy=same-origin
      # script-src requires 'unsafe-inline': TanStack Start's streaming SSR emits
      # dynamic per-request inline scripts (hydration bootstrap + $tsr stream
      # barrier) that cannot be pre-hashed. A hash/nonce here makes browsers
      # ignore 'unsafe-inline', which blocks those scripts and breaks hydration.
      - "traefik.http.middlewares.ce2-sec.headers.customResponseHeaders.Content-Security-Policy=default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.googleusercontent.com; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com https://*.googleusercontent.com; worker-src 'self' blob:; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'; upgrade-insecure-requests"
    networks:
      - ce-v2-network
      - proxy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      rabbitmq:
        condition: service_healthy

  rabbitmq:
    build: ./rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    ports:
      # MQTT broker. If Frigate runs on a DIFFERENT host it must reach this
      # port — in that case bind to the specific trusted interface instead of
      # loopback (e.g. '10.0.0.5:1883:1883'). Loopback is the secure default.
      - '127.0.0.1:1883:1883'
      # Management UI — admin only, never expose publicly. Reach via SSH tunnel.
      - '127.0.0.1:15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ce-v2-network
    labels:
      - 'traefik.enable=false'

volumes:
  ce-v2-data:
  rabbitmq-data:

networks:
  ce-v2-network:
  proxy:
    external: true
