name: Promote Image to Release

on:
  workflow_run:
    workflows: ['Build & Push Docker Image']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to promote (defaults to latest main build)'
        required: false
      run_number:
        description: 'Build workflow run number (for version tag, e.g. 42)'
        required: false

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: promote-release
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Resolve source SHA
        id: resolve
        run: |
          SHA="${{ inputs.sha || github.event.workflow_run.head_sha || github.sha }}"
          if [ -z "$SHA" ]; then
            echo "Could not resolve a source SHA" >&2
            exit 1
          fi
          SHORT=$(echo "$SHA" | cut -c1-7)
          RUN_NUM="${{ inputs.run_number || github.event.workflow_run.run_number }}"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "version=0.0.${RUN_NUM}" >> "$GITHUB_OUTPUT"
          echo "Promoting sha-$SHORT to :release (version 0.0.${RUN_NUM})"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image as release
        run: |
          SRC="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.resolve.outputs.short }}"
          DST_RELEASE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:release"
          DST_VERSION="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.resolve.outputs.version }}"
          docker buildx imagetools create --tag "$DST_RELEASE" --tag "$DST_VERSION" "$SRC"

      - name: Summary
        run: |
          echo "Promoted \`sha-${{ steps.resolve.outputs.short }}\` → \`:release\`" >> "$GITHUB_STEP_SUMMARY"
