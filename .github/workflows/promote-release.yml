name: Promote Image to Release

on:
  workflow_run:
    workflows: ['Build & Push Docker Image']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to promote (defaults to latest main build)'
        required: false

permissions:
  contents: read
  packages: write
  actions: read

concurrency:
  group: promote-release
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  promote:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Resolve source SHA
        id: resolve
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            SHA="${{ inputs.sha }}"
          else
            SHA="${{ github.event.workflow_run.head_sha }}"
          fi
          SHORT=$(echo "$SHA" | cut -c1-7)
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "short=$SHORT" >> "$GITHUB_OUTPUT"
          echo "Promoting sha-$SHORT to :release"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag image as release
        run: |
          SRC="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ steps.resolve.outputs.short }}"
          DST="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:release"
          docker buildx imagetools create --tag "$DST" "$SRC"

      - name: Summary
        run: |
          echo "Promoted \`sha-${{ steps.resolve.outputs.short }}\` → \`:release\`" >> "$GITHUB_STEP_SUMMARY"
