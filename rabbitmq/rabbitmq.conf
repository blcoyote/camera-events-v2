# MQTT listener on standard port
mqtt.listeners.tcp.default = 1883
mqtt.allow_anonymous = false

# Frigate publishes to topics like frigate/events — map to AMQP exchange
mqtt.exchange = amq.topic
mqtt.vhost = /

# Keep connections alive (86400 seconds = 24 hours)
mqtt.max_session_expiry_interval_seconds = 86400
